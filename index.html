<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自然予報 | nature-forecast</title>
<style>
  :root {
    --bg: #0a0e1a;
    --card: #111827;
    --accent: #38bdf8;
    --text: #e2e8f0;
    --sub: #94a3b8;
    --border: #1e293b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #0c1445, #1e3a5f);
    padding: 2rem 1.5rem 1.5rem;
    text-align: center;
  }
  header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.05em; }
  header p { color: var(--sub); font-size: 0.82rem; margin-top: 0.4rem; }

  main {
    max-width: 800px;
    margin: 2rem auto;
    padding: 0 1rem;
  }

  .section-title {
    font-size: 0.72rem;
    color: var(--sub);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 1rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--border);
  }

  /* グループボックス */
  .group-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 1.5rem;
  }

  .group-header {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    padding: 1.1rem 1.3rem;
    background: linear-gradient(90deg, #0c1a2e, #111827);
    border-bottom: 1px solid var(--border);
    text-decoration: none;
    color: var(--text);
    transition: background 0.2s;
  }
  .group-header:hover { background: linear-gradient(90deg, #112240, #1a2744); }

  .group-icon { font-size: 1.6rem; }
  .group-info { flex: 1; }
  .group-name {
    font-size: 1rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .group-desc { font-size: 0.75rem; color: var(--sub); margin-top: 0.25rem; line-height: 1.4; }
  .group-arrow { color: var(--accent); font-size: 1rem; }

  .badge {
    display: inline-block;
    font-size: 0.62rem;
    font-weight: 600;
    padding: 0.12rem 0.45rem;
    border-radius: 4px;
  }
  .badge-live { background: #0f4c2a; color: #4ade80; }

  /* 地点リスト */
  .spot-list {
    display: flex;
    flex-direction: column;
  }

  .spot-item {
    display: flex;
    align-items: center;
    padding: 0.75rem 1.3rem 0.75rem 1.5rem;
    text-decoration: none;
    color: var(--text);
    border-top: 1px solid var(--border);
    font-size: 0.85rem;
    transition: background 0.15s;
    gap: 0.6rem;
  }
  .spot-item:hover { background: #1a2236; }

  .spot-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }
  .spot-name { flex: 1; }
  .spot-note { font-size: 0.72rem; color: var(--sub); }
  .spot-chevron { color: var(--border); font-size: 0.8rem; }

  footer {
    text-align: center;
    padding: 2rem 1rem;
    font-size: 0.72rem;
    color: var(--sub);
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

<header>
  <h1>🌿 自然予報</h1>
  <p>自然現象の「見ごろ」を数値で届ける実験サイト群</p>
</header>

<main>
  <div class="section-title">自然タイプから探す</div>

  <!-- 干潟・鏡張りグループ -->
  <div class="group-box">
    <a class="group-header" href="/mirror/tidal/">
      <div class="group-icon">🌊</div>
      <div class="group-info">
        <div class="group-name">
          干潟・鏡張り
          <span class="badge badge-live">予報中</span>
        </div>
        <div class="group-desc">干潮 × 日没 × 風速の三重条件で「鏡張り見ごろ指数」を算出</div>
      </div>
      <div class="group-arrow">→</div>
    </a>
    <div class="spot-list">
      <a class="spot-item" href="/mirror/tidal/chichibugahama/">
        <span class="spot-dot"></span>
        <span class="spot-name">父母ヶ浜</span>
        <span class="spot-note">香川・三豊市 / 日本版ウユニ塩湖</span>
        <span class="spot-chevron">›</span>
      </a>
      <a class="spot-item" href="/mirror/tidal/kagami_no_umi/">
        <span class="spot-dot"></span>
        <span class="spot-name">かがみの海</span>
        <span class="spot-note">福岡・福津市</span>
        <span class="spot-chevron">›</span>
      </a>
      <a class="spot-item" href="/mirror/tidal/tenjinzaki/">
        <span class="spot-dot"></span>
        <span class="spot-name">天神崎</span>
        <span class="spot-note">和歌山・田辺市</span>
        <span class="spot-chevron">›</span>
      </a>
    </div>
  </div>

  <!-- 山岳リフレクショングループ -->
  <div class="group-box">
    <a class="group-header" href="/mirror/mountain/">
      <div class="group-icon">🏔</div>
      <div class="group-info">
        <div class="group-name">
          山岳リフレクション
          <span class="badge badge-live">予報中</span>
        </div>
        <div class="group-desc">無風 × 日の出 × 視程の三重条件で「逆さ山・湖面リフレクション見ごろ指数」を算出</div>
      </div>
      <div class="group-arrow">→</div>
    </a>
    <div class="spot-list">
      <a class="spot-item" href="/mirror/mountain/shojiko/">
        <span class="spot-dot"></span>
        <span class="spot-name">精進湖</span>
        <span class="spot-note">山梨 / 逆さ富士・子抱き富士</span>
        <span class="spot-chevron">›</span>
      </a>
      <a class="spot-item" href="/mirror/mountain/hibarako/">
        <span class="spot-dot"></span>
        <span class="spot-name">桧原湖</span>
        <span class="spot-note">福島 / 逆さ磐梯山</span>
        <span class="spot-chevron">›</span>
      </a>
      <a class="spot-item" href="/mirror/mountain/tsutanuma/">
        <span class="spot-dot"></span>
        <span class="spot-name">蔦沼</span>
        <span class="spot-note">青森 / 朝焼けブナ林リフレクション</span>
        <span class="spot-chevron">›</span>
      </a>
    </div>
  </div>

  <!-- 準備中グループ（非公開） -->
  <!-- 雲海 / 朝焼け夕焼け / 星空 — display:none で非公開。追加時はここを有効化 -->

</main>

<footer>
  <a href="https://note.com/yuru_tech_log" target="_blank" rel="noopener" style="color:#38bdf8;text-decoration:none;">ゆるてくログ</a> の実験サイト群
</footer>

</body>
</html>
